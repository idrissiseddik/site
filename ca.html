<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaalix Pro - Gestion</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/plugins/monthSelect/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    
    <style>
        :root {
            --primary-dark: #0a2622;
            --forest-green: #143d36;
            --accent-green: #2ecc71;
            --text-gold: #f1c40f;
            --card-bg: #1b4d44;
        }

        body {
            background-color: var(--primary-dark);
            color: #ecf0f1;
            font-family: 'Segoe UI', Roboto, sans-serif;
            padding-bottom: 100px;
        }

        .header {
            background: linear-gradient(180deg, #051614 0%, var(--forest-green) 100%);
            padding: 20px 15px;
            text-align: center;
            border-bottom: 2px solid var(--accent-green);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 15px;
        }

        .brand-name { color: var(--accent-green); font-weight: 800; font-size: 1.6rem; }
        
        .btn-tools {
            background: rgba(46, 204, 113, 0.15);
            border: 1px solid var(--accent-green);
            color: white;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-top: 10px;
        }

        .dropdown-menu { background-color: #143d36; border: 1px solid var(--accent-green); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .dropdown-item { color: #ecf0f1; padding: 10px 20px; }
        .dropdown-item:hover { background-color: var(--accent-green); color: var(--primary-dark); }
        .dropdown-divider { border-top: 1px solid rgba(255,255,255,0.1); }

        .custom-filter-container {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 15px;
        }

        .flatpickr-input {
            background-color: var(--forest-green) !important;
            border: 1px solid var(--accent-green) !important;
            color: white !important;
            text-align: center;
            border-radius: 10px;
            padding: 8px;
        }

        .alert-pending {
            background: #e74c3c;
            color: white;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
            animation: pulse-red 2s infinite;
        }

        @keyframes pulse-red {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .status-filter-group { display: flex; gap: 5px; margin-top: 10px; }
        .btn-filter-status {
            flex: 1; font-size: 0.75rem; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.2); color: white; padding: 8px; border-radius: 8px;
        }
        .btn-filter-status.active {
            background: var(--accent-green); border-color: var(--accent-green);
            color: var(--primary-dark); font-weight: bold;
        }

        .card-commande {
            background: var(--card-bg); border-radius: 15px; padding: 15px;
            margin-bottom: 15px; border: 1px solid rgba(46, 204, 113, 0.2);
        }
        .card-commande.annulee { border-left: 5px solid #e74c3c; }
        .info-row { font-size: 0.9rem; margin-bottom: 5px; opacity: 0.9; }
        .info-row i { color: var(--accent-green); margin-right: 8px; width: 20px; }

        .stat-card {
            background: var(--forest-green); border: 1px solid var(--accent-green);
            border-radius: 12px; padding: 10px; text-align: center;
        }

        .footer-nav {
            position: fixed; bottom: 0; width: 100%; background: #051614; height: 60px;
            display: flex; justify-content: space-around; align-items: center;
            border-top: 2px solid var(--accent-green); z-index: 1000;
        }

        .btn-add {
            position: fixed; bottom: 80px; right: 20px; width: 55px; height: 55px;
            border-radius: 50%; background: var(--accent-green); color: var(--primary-dark);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4); border: none; z-index: 1000;
        }

        .swal-select { background-color: #1b4d44 !important; color: white !important; border: 1px solid #2ecc71 !important; }
        
        #loadingOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 38, 34, 0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
        }
    </style>
</head>
<body>

    <div id="loadingOverlay">
        <div class="spinner-border text-success mb-3" style="width: 3rem; height: 3rem;" role="status"></div>
        <h5 class="text-white">Chargement...</h5>
    </div>

    <div class="header">
        <span class="brand-name">KAALIX PRO</span>
        <div class="dropdown">
            <button class="btn btn-tools dropdown-toggle" type="button" id="dropdownMenuButton" data-bs-toggle="dropdown" aria-expanded="false">
                <i class="fas fa-database me-1"></i> Données
            </button>
            <ul class="dropdown-menu dropdown-menu-center" aria-labelledby="dropdownMenuButton">
                <li><a class="dropdown-item" href="javascript:void(0)" onclick="exportExcel()"><i class="fas fa-file-excel text-success me-2"></i>Export Excel</a></li>
                <li><a class="dropdown-item" href="javascript:void(0)" onclick="exportJSON()"><i class="fas fa-file-download text-info me-2"></i>Sauvegarder JSON</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item text-danger" href="javascript:void(0)" onclick="resetAll()"><i class="fas fa-trash-alt me-2"></i>Vider tout (Sheets)</a></li>
            </ul>
        </div>
    </div>

    <div class="container">
        <div id="pendingAlertZone"></div>

        <div class="custom-filter-container">
            <div class="row g-2">
                <div class="col-6">
                    <label class="small text-gold d-block mb-1">Par Jour</label>
                    <input type="text" id="filterDate" class="form-control" placeholder="Jour">
                </div>
                <div class="col-6">
                    <label class="small text-gold d-block mb-1">Par Mois</label>
                    <input type="text" id="filterMonth" class="form-control" placeholder="Mois">
                </div>
            </div>
            <div class="status-filter-group">
                <button class="btn-filter-status active" onclick="setStatusFilter('TOUT', this)">Tous</button>
                <button class="btn-filter-status" onclick="setStatusFilter('Annulée', this)">Annulées</button>
                <button class="btn-filter-status" onclick="setStatusFilter('Pas encore annulée', this)">En attente</button>
            </div>
            <div class="text-center mt-2">
                <button class="btn btn-sm btn-link text-white-50 p-0" onclick="clearFilters()">Effacer les filtres</button>
            </div>
        </div>

        <div class="row g-2 mb-4">
            <div class="col-6"><div class="stat-card"><small>Sélection</small><h4 id="totalCount" class="mb-0">0</h4></div></div>
            <div class="col-6"><div class="stat-card"><small class="text-danger">Annulées</small><h4 id="annuleeCount" class="mb-0 text-danger">0</h4></div></div>
        </div>

        <div id="commandesList"></div>
    </div>

    <button class="btn-add" onclick="showAddModal()"><i class="fas fa-plus fa-lg"></i></button>

    <div class="footer-nav">
        <div onclick="activerRecherche()"><i class="fas fa-search fa-lg"></i></div>
        <div onclick="loadDataFromSheets()"><i class="fas fa-sync-alt fa-lg"></i></div>
        <div onclick="Swal.fire({title:'Gestion des annulations', text:'Application développé par : M.Seddik Elidrissi', icon:'info', background:'#0a2622', color:'#fff'})">
            <i class="fas fa-user-circle fa-lg"></i>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/fr.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/plugins/monthSelect/index.js"></script>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxadxaBaxWN1ej9dGvywgbmwzKbUrS5oXGCiQmYixnVK0WdPcaO9ablYFMfioZjMowJ/exec';

        let commandes = [];
        const listeCaisse = ["Khawla", "Seddik", "Salma", "Lamia", "Zakia"];
        const listeLivreur = ["Fahd", "Mustapha", "Rachid"];
        
        let currentStatusFilter = "TOUT";
        let searchKeyword = "";

        const fpDate = flatpickr("#filterDate", {
            locale: "fr", dateFormat: "Y-m-d", altInput: true, altFormat: "d M Y",
            onChange: (s, dateStr) => { if(dateStr) { fpMonth.clear(); searchKeyword = ""; renderCommandes(); } }
        });

        const fpMonth = flatpickr("#filterMonth", {
            locale: "fr", plugins: [new monthSelectPlugin({shorthand: true, dateFormat: "Y-m", altFormat: "F Y", theme: "dark"})],
            onChange: (s, dateStr) => { if(dateStr) { fpDate.clear(); searchKeyword = ""; renderCommandes(); } }
        });

        function showLoading(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }

        function formaterDateFr(dateStr) {
            if (!dateStr) return "-";
            if (dateStr.includes("T")) {
                dateStr = dateStr.split("T")[0];
            }
            const parties = dateStr.split("-");
            if (parties.length === 3) {
                return `${parties[2]}/${parties[1]}/${parties[0]}`;
            }
            return dateStr;
        }

        async function loadDataFromSheets() {
            showLoading(true);
            try {
                const response = await fetch(SCRIPT_URL);
                if (!response.ok) throw new Error('Erreur réseau');
                commandes = await response.json();
                renderCommandes();
            } catch (error) {
                console.error(error);
                Swal.fire('Erreur', 'Impossible de charger les données depuis Google Sheets', 'error');
            } finally {
                showLoading(false);
            }
        }

        function setStatusFilter(status, btn) {
            currentStatusFilter = status;
            document.querySelectorAll('.btn-filter-status').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderCommandes();
        }

        function clearFilters() {
            fpDate.clear(); fpMonth.clear(); searchKeyword = ""; currentStatusFilter = "TOUT";
            document.querySelectorAll('.btn-filter-status').forEach(b => b.classList.remove('active'));
            document.querySelector('.btn-filter-status:first-child').classList.add('active');
            renderCommandes();
        }

        async function activerRecherche() {
            const { value: keyword } = await Swal.fire({
                title: 'Rechercher REF', input: 'text', background: '#143d36', color: '#fff', confirmButtonColor: '#2ecc71'
            });
            if (keyword !== undefined) {
                searchKeyword = keyword.trim().toLowerCase();
                if(searchKeyword !== "") { fpDate.clear(); fpMonth.clear(); }
                renderCommandes();
            }
        }

        function renderCommandes() {
            const list = document.getElementById('commandesList');
            const alertZone = document.getElementById('pendingAlertZone');
            const fD = document.getElementById('filterDate').value;
            const fM = document.getElementById('filterMonth').value;
            
            list.innerHTML = '';
            let filtered = [...commandes];

            if (searchKeyword !== "") {
                filtered = filtered.filter(c => c.numero && c.numero.toString().toLowerCase().includes(searchKeyword));
            } 
            else if (fD) { filtered = filtered.filter(c => c.date === fD); } 
            else if (fM) { filtered = filtered.filter(c => c.date && c.date.substring(0, 7) === fM); }

            let totalPending = filtered.filter(c => c.etat === 'Pas encore annulée').length;
            alertZone.innerHTML = (totalPending > 0 && currentStatusFilter !== "Annulée") ? 
                `<div class="alert-pending"><i class="fas fa-exclamation-circle me-2"></i>${totalPending} en attente d'annulation</div>` : '';

            if (currentStatusFilter !== "TOUT") {
                filtered = filtered.filter(c => c.etat === currentStatusFilter);
            }

            document.getElementById('totalCount').innerText = filtered.length;
            document.getElementById('annuleeCount').innerText = filtered.filter(c => c.etat === 'Annulée').length;

            if(filtered.length === 0) {
                list.innerHTML = '<div class="text-center opacity-50 mt-5">Aucune donnée</div>';
                return;
            }

            filtered.reverse().forEach((cmd) => {
                const isAnn = cmd.etat === 'Annulée';
                list.innerHTML += `
                    <div class="card-commande ${isAnn ? 'annulee' : ''}">
                        <div class="d-flex justify-content-between mb-2">
                            <span class="text-gold fw-bold">#${cmd.numero}</span>
                            <span class="badge ${isAnn ? 'bg-danger' : 'bg-success'}">${cmd.etat}</span>
                        </div>
                        <div class="info-row"><i class="fas fa-store"></i>${cmd.caisse}</div>
                        <div class="info-row"><i class="fas fa-motorcycle"></i>${cmd.livreur}</div>
                        <div class="info-row"><i class="far fa-calendar-alt"></i>${formaterDateFr(cmd.date)}</div>
                        <p class="small opacity-50 mt-2 mb-0">Note: ${cmd.motif}</p>
                        <div class="mt-3 d-flex justify-content-end gap-2">
                            ${!isAnn ? `<button class="btn btn-sm btn-outline-danger" onclick="changerEtat('${cmd.numero}')">Annuler</button>` : ''}
                            <button class="btn btn-sm btn-dark" onclick="supprimer('${cmd.numero}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>`;
            });
        }

        async function showAddModal() {
            const optionsCaisse = listeCaisse.map(n => `<option value="${n}">${n}</option>`).join('') + '<option value="Autre">Autre</option>';
            const optionsLivreur = listeLivreur.map(n => `<option value="${n}">${n}</option>`).join('') + '<option value="Autre">Autre</option>';
            const { value: v } = await Swal.fire({
                title: 'Nouvelle Commande',
                background: '#143d36', color: '#fff',
                html: `
                    <div class="text-start">
                        <label class="small text-white-50 mb-1">Référence</label>
                        <input id="sw-ref" class="form-control mb-2" placeholder="Référence">
                        <label class="small text-white-50 mb-1">Date</label>
                        <input id="sw-date" class="form-control mb-2" type="date" value="${new Date().toISOString().split('T')[0]}">
                        <label class="small text-white-50 mb-1">Caisse</label>
                        <select id="sw-caisse" class="form-select mb-2 swal-select" onchange="toggleAutre('sw-caisse', 'sw-caisse-autre')">${optionsCaisse}</select>
                        <input id="sw-caisse-autre" class="form-control mb-2 d-none" placeholder="Nom caisse">
                        <label class="small text-white-50 mb-1">Livreur</label>
                        <select id="sw-livreur" class="form-select mb-2 swal-select" onchange="toggleAutre('sw-livreur', 'sw-livreur-autre')">${optionsLivreur}</select>
                        <input id="sw-livreur-autre" class="form-control mb-2 d-none" placeholder="Nom livreur">
                        <label class="small text-white-50 mb-1">Motif</label>
                        <textarea id="sw-motif" class="form-control" placeholder="Motif..."></textarea>
                    </div>`,
                confirmButtonColor: '#2ecc71',
                preConfirm: () => {
                    let c = document.getElementById('sw-caisse').value;
                    let l = document.getElementById('sw-livreur').value;
                    if(c === 'Autre') c = document.getElementById('sw-caisse-autre').value;
                    if(l === 'Autre') l = document.getElementById('sw-livreur-autre').value;
                    
                    const ref = document.getElementById('sw-ref').value.trim();
                    if(!ref) {
                        Swal.showValidationMessage("La référence est obligatoire");
                        return false;
                    }
                    
                    if(commandes.some(cmd => cmd.numero.toString() === ref.toString())) {
                        Swal.showValidationMessage("Cette référence existe déjà !");
                        return false;
                    }

                    return {
                        action: "add",
                        numero: ref,
                        date: document.getElementById('sw-date').value,
                        caisse: c, livreur: l, motif: document.getElementById('sw-motif').value || '-', etat: 'Pas encore annulée'
                    };
                }
            });
            
            if (v) {
                showLoading(true);
                try {
                    const response = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify(v)
                    });
                    const res = await response.json();
                    if(res.status === "success") {
                        clearFilters();
                        await loadDataFromSheets();
                    } else { throw new Error(); }
                } catch {
                    Swal.fire('Erreur', 'Impossible d\'ajouter la commande dans Google Sheets', 'error');
                } finally {
                    showLoading(false);
                }
            }
        }

        function toggleAutre(sId, iId) {
            const s = document.getElementById(sId); const i = document.getElementById(iId);
            s.value === 'Autre' ? i.classList.remove('d-none') : i.classList.add('d-none');
        }
        
        async function changerEtat(numero) { 
            Swal.fire({
                title: 'Confirmer ?', text: "Marquer comme annulée ?", icon: 'warning',
                showCancelButton: true, confirmButtonColor: '#2ecc71', confirmButtonText: 'Oui'
            }).then(async (r) => { 
                if (r.isConfirmed) { 
                    showLoading(true);
                    try {
                        const response = await fetch(SCRIPT_URL, {
                            method: 'POST',
                            body: JSON.stringify({ action: "updateEtat", numero: numero, etat: "Annulée" })
                        });
                        const res = await response.json();
                        if (res.status === "success") {
                            await loadDataFromSheets();
                        } else { throw new Error(); }
                    } catch {
                        Swal.fire('Erreur', 'Impossible de modifier l\'état sur Google Sheets', 'error');
                    } finally {
                        showLoading(false);
                    }
                } 
            });
        }

        async function supprimer(numero) { 
            Swal.fire({
                title: 'Supprimer ?', text: "Action irréversible sur la feuille Google Sheets", icon: 'error',
                showCancelButton: true, confirmButtonColor: '#d33', confirmButtonText: 'Supprimer'
            }).then(async (r) => { 
                if (r.isConfirmed) { 
                    showLoading(true);
                    try {
                        const response = await fetch(SCRIPT_URL, {
                            method: 'POST',
                            body: JSON.stringify({ action: "delete", numero: numero })
                        });
                        const res = await response.json();
                        if (res.status === "success") {
                            await loadDataFromSheets();
                        } else { throw new Error(); }
                    } catch {
                        Swal.fire('Erreur', 'Impossible de supprimer sur Google Sheets', 'error');
                    } finally {
                        showLoading(false);
                    }
                } 
            });
        }
        
        function exportExcel() {
            if(commandes.length === 0) return Swal.fire('Erreur', 'Aucune donnée à exporter', 'error');
            const ws = XLSX.utils.json_to_sheet(commandes);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Commandes");
            XLSX.writeFile(wb, `Kaalix_Report_${new Date().toISOString().split('T')[0]}.xlsx`);
        }

        function exportJSON() {
            if(commandes.length === 0) return Swal.fire('Erreur', 'Aucune donnée à sauvegarder', 'error');
            const blob = new Blob([JSON.stringify(commandes)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `Kaalix_Backup_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        async function resetAll() {
            Swal.fire({
                title: 'TOUT VIDER ?', text: "Toutes les commandes du Google Sheet seront définitivement perdues !", icon: 'warning',
                showCancelButton: true, confirmButtonColor: '#d33', confirmButtonText: 'Oui, tout supprimer'
            }).then(async (r) => { 
                if(r.isConfirmed) { 
                    showLoading(true);
                    try {
                        const response = await fetch(SCRIPT_URL, {
                            method: 'POST',
                            body: JSON.stringify({ action: "reset" })
                        });
                        const res = await response.json();
                        if (res.status === "success") {
                            await loadDataFromSheets();
                        } else { throw new Error(); }
                    } catch {
                        Swal.fire('Erreur', 'Impossible de vider la feuille Google Sheets', 'error');
                    } finally {
                        showLoading(false);
                    }
                } 
            });
        }

        window.onload = loadDataFromSheets;
    </script>
</body>
</html>
