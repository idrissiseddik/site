<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion de Caisse - Sndo9</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <style>
        body { background-color: #f4f6f9; font-family: sans-serif; }
        .balance-card { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; border-radius: 15px; }
        .btn-action { border-radius: 12px; height: 55px; font-weight: 600; }
        .history-item { border-radius: 10px; background-color: white; border-right: 5px solid #ccc; }
        .history-item.plus { border-right-color: #198754; }
        .history-item.moins { border-right-color: #dc3545; }
    </style>
</head>
<body>

    <div class="container-fluid px-3 py-4" style="max-width: 500px; margin: 0 auto;">
        <div class="text-center mb-4"><h3 class="fw-bold">إدارة الصندوق</h3></div>

        <!-- Card Total -->
        <div class="balance-card p-4 text-center mb-3">
            <span>المجموع الكلي</span>
            <h1 class="display-5 fw-bold my-2" id="totalBalance">0.00 DH</h1>
            <div class="d-flex justify-content-around mt-3 pt-3 border-top border-white-50">
                <div>
                    <small class="d-block opacity-75">الدخل (+)</small>
                    <span class="fw-bold" id="totalIn" style="color: #2ed573;">0.00 DH</span>
                </div>
                <div class="border-start border-white-50"></div>
                <div>
                    <small class="d-block opacity-75">الخارج (-)</small>
                    <span class="fw-bold" id="totalOut" style="color: #ff4757;">0.00 DH</span>
                </div>
            </div>
        </div>

        <!-- الأزرار -->
        <div class="mb-2">
            <button class="btn btn-primary w-100 fw-bold py-2" id="toggleHistoryBtn" onclick="toggleHistory()">
                <i class="fa-solid fa-list me-1"></i> إظهار الحركات اليومية
            </button>
        </div>
        <div class="mb-4">
            <button class="btn btn-outline-warning w-100 fw-bold btn-sm" onclick="resetAll()">
                <i class="fa-solid fa-arrows-rotate"></i> إعادة تعيين الصندوق
            </button>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-6">
                <button class="btn btn-success w-100 btn-action" onclick="openMouvementModal('plus')">
                    <i class="fa-solid fa-plus"></i> زيادة
                </button>
            </div>
            <div class="col-6">
                <button class="btn btn-danger w-100 btn-action" onclick="openMouvementModal('moins')">
                    <i class="fa-solid fa-minus"></i> نقصان
                </button>
            </div>
        </div>

        <!-- السجل -->
        <div id="historySection" class="d-none">
            <h5 class="fw-bold text-secondary mb-3"><i class="fa-solid fa-history me-1"></i> السجل اليومي</h5>
            <div id="mouvementHistory" class="d-flex flex-column gap-2" style="max-height: 350px; overflow-y: auto;"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzEWQ-jjBcJMTwnAtGfW5TAn062udoCY2L1g4MgYtRKJaSAknIirVqKzjgY_C5-Gzw3/exec';
        let transactions = JSON.parse(localStorage.getItem('sndo9_transactions')) || [];
        let historyVisible = false;

        function updateUI() {
            let total = 0, totalIn = 0, totalOut = 0;
            let html = '';
            transactions.forEach(t => {
                if (t.type === 'plus') { total += t.amount; totalIn += t.amount; }
                else { total -= t.amount; totalOut += t.amount; }
                html += `<div class="history-item ${t.type} p-3 shadow-sm d-flex justify-content-between align-items-center">
                            <div><h6 class="mb-0 fw-bold text-dark">${t.reason}</h6><small class="text-muted">${t.date}</small></div>
                            <span class="fw-bold ${t.type === 'plus' ? 'text-success' : 'text-danger'}">${t.type === 'plus' ? '+' : '-'}${t.amount.toFixed(2)} DH</span>
                         </div>`;
            });
            document.getElementById('totalBalance').innerText = `${total.toFixed(2)} DH`;
            document.getElementById('totalIn').innerText = `${totalIn.toFixed(2)} DH`;
            document.getElementById('totalOut').innerText = `${totalOut.toFixed(2)} DH`;
            document.getElementById('mouvementHistory').innerHTML = html || '<div class="text-center text-muted py-3">لا توجد عمليات</div>';
        }

        async function syncToSheet(data) {
            fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
        }

        function toggleHistory() {
            const section = document.getElementById('historySection');
            historyVisible = !historyVisible;
            section.classList.toggle('d-none', !historyVisible);
        }

        function resetAll() {
            Swal.fire({ title: 'تأكيد المسح؟', icon: 'warning', showCancelButton: true, confirmButtonText: 'نعم', cancelButtonText: 'إلغاء' }).then((result) => {
                if (result.isConfirmed) {
                    transactions = [];
                    localStorage.removeItem('sndo9_transactions');
                    updateUI();
                }
            });
        }

        function openMouvementModal(type) {
            Swal.fire({
                title: type === 'plus' ? 'إضافة مبلغ' : 'سحب مبلغ',
                html: '<input type="number" id="amt" class="form-control mb-2" placeholder="المبلغ"><input type="text" id="rsn" class="form-control" placeholder="السبب">',
                confirmButtonText: 'تأكيد',
                preConfirm: () => {
                    return { type, amount: parseFloat(document.getElementById('amt').value), reason: document.getElementById('rsn').value || 'لا يوجد سبب', date: new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }) };
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    transactions.unshift(result.value);
                    localStorage.setItem('sndo9_transactions', JSON.stringify(transactions));
                    syncToSheet(result.value);
                    updateUI();
                }
            });
        }
        updateUI();
    </script>
</body>
</html>
